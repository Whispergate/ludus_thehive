---
# ========================
# General
# ========================

# Minimum RAM required (Cassandra + Elasticsearch + TheHive + OS)
ludus_thehive_min_ram_mb: 7168

# Host directory where the StrangeBee docker repo is cloned and stack is run
ludus_thehive_install_dir: /opt/thehive

# Which StrangeBee profile to deploy: "prod1-thehive" (standard) or "prod2-thehive" (high-perf)
ludus_thehive_profile: prod1-thehive

# Git revision of StrangeBeeCorp/docker to pin (branch, tag, or commit SHA).
# Use "main" to always get latest; pin a commit for reproducibility.
ludus_thehive_git_repo: https://github.com/StrangeBeeCorp/docker.git
ludus_thehive_git_version: main

# ========================
# TheHive service
# ========================

# Port the TheHive web UI is exposed on (host side, bound by the thehive container)
ludus_thehive_port: 9000

# Expose nginx TLS reverse proxy on 443 (set false to skip nginx service entirely)
ludus_thehive_enable_nginx: true
ludus_thehive_server_name: "thehive.local"

# ========================
# Credentials
# ========================

# Elasticsearch password for the built-in "elastic" user. Auto-generated if empty.
ludus_thehive_elasticsearch_password: ""

# TheHive play.http.secret.key. Auto-generated if empty.
ludus_thehive_play_secret: ""

# ========================
# Integrations (informational)
# ========================
# MISP and Cortex connectors are compiled into the image and enabled in
# application.conf. Actual server connections are configured post-install
# via the TheHive UI (Platform Management > Connectors).

ludus_thehive_misp_enabled: false
ludus_thehive_wazuh_enabled: false
ludus_thehive_opencti_enabled: false

# Wazuh-side integration script settings (only used if wazuh_enabled is true
# AND this VM is also the Wazuh manager)
ludus_thehive_wazuh_alert_level: 6
ludus_thehive_wazuh_api_key: ""
ludus_thehive_wazuh_thehive_url: "http://{{ ansible_default_ipv4.address }}:{{ ludus_thehive_port }}"
