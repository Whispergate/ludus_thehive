---
# MISP integration is configured natively in TheHive's application.conf.
# This task file validates the configuration and displays connection info.

- name: Validate MISP server configuration
  ansible.builtin.assert:
    that:
      - ludus_thehive_misp_servers | length > 0
    fail_msg: "ludus_thehive_misp_enabled is true but ludus_thehive_misp_servers is empty. Define at least one MISP server."

- name: Display MISP integration info
  ansible.builtin.debug:
    msg:
      - "MISP integration is enabled with {{ ludus_thehive_misp_servers | length }} server(s)"
      - "Servers: {{ ludus_thehive_misp_servers | map(attribute='name') | join(', ') }}"
      - "Note: MISP connection can also be configured via TheHive UI under Platform Management > Connectors > MISP"
