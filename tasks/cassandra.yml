---
- name: Add Apache Cassandra GPG key
  ansible.builtin.get_url:
    url: https://downloads.apache.org/cassandra/KEYS
    dest: /usr/share/keyrings/cassandra-keyring.asc
    mode: "0644"

- name: Add Apache Cassandra repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/cassandra-keyring.asc] https://debian.cassandra.apache.org {{ ludus_thehive_cassandra_version | replace('.', '') }}x main"
    filename: cassandra
    state: present

- name: Install Cassandra
  ansible.builtin.apt:
    name: cassandra
    state: present
    update_cache: true

- name: Stop Cassandra before reconfiguration
  ansible.builtin.service:
    name: cassandra
    state: stopped

- name: Wipe Cassandra data directory for clean reconfiguration
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /var/lib/cassandra/data
    - /var/lib/cassandra/commitlog
    - /var/lib/cassandra/saved_caches

- name: Recreate Cassandra data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: cassandra
    group: cassandra
    mode: "0750"
  loop:
    - /var/lib/cassandra/data
    - /var/lib/cassandra/commitlog
    - /var/lib/cassandra/saved_caches

- name: Deploy Cassandra configuration
  ansible.builtin.template:
    src: cassandra.yaml.j2
    dest: /etc/cassandra/cassandra.yaml
    owner: cassandra
    group: cassandra
    mode: "0644"
    backup: true

- name: Start and enable Cassandra
  ansible.builtin.service:
    name: cassandra
    state: started
    enabled: true
  register: cassandra_start
  ignore_errors: true

- name: Gather Cassandra logs if start failed
  when: cassandra_start is failed
  block:
    - name: Get systemctl status for Cassandra
      ansible.builtin.command: systemctl status cassandra --no-pager
      register: cassandra_status
      changed_when: false
      failed_when: false

    - name: Get journalctl output for Cassandra
      ansible.builtin.command: journalctl -u cassandra --no-pager -n 100
      register: cassandra_journal
      changed_when: false
      failed_when: false

    - name: Display Cassandra failure diagnostics
      ansible.builtin.debug:
        msg:
          - "=== systemctl status ==="
          - "{{ cassandra_status.stdout_lines | default([]) }}"
          - "=== journalctl ==="
          - "{{ cassandra_journal.stdout_lines | default([]) }}"

    - name: Fail with Cassandra start error
      ansible.builtin.fail:
        msg: "Cassandra failed to start. See diagnostics above."

- name: Wait for Cassandra CQL port to be ready
  ansible.builtin.wait_for:
    port: 9042
    host: "{{ ludus_thehive_cassandra_listen_address }}"
    delay: 15
    timeout: 600

- name: Install Python Cassandra driver for cqlsh operations
  ansible.builtin.apt:
    name: python3-cassandra
    state: present

- name: Wait for Cassandra default superuser to be ready
  ansible.builtin.command:
    cmd: >
      cqlsh {{ ludus_thehive_cassandra_listen_address }} 9042
      -u cassandra -p cassandra
      -e "DESCRIBE KEYSPACES;"
  register: cqlsh_test
  retries: 12
  delay: 10
  until: cqlsh_test.rc == 0
  changed_when: false
  failed_when: false

- name: Update default Cassandra superuser password
  ansible.builtin.command:
    cmd: >
      cqlsh {{ ludus_thehive_cassandra_listen_address }} 9042
      -u cassandra -p cassandra
      -e "ALTER USER cassandra WITH PASSWORD '{{ ludus_thehive_cassandra_admin_password }}';"
  when: ludus_thehive_cassandra_admin_password != "cassandra"
  changed_when: true
  failed_when: false

- name: Create TheHive Cassandra role
  ansible.builtin.command:
    cmd: >
      cqlsh {{ ludus_thehive_cassandra_listen_address }} 9042
      -u cassandra -p {{ ludus_thehive_cassandra_admin_password }}
      -e "CREATE ROLE IF NOT EXISTS {{ ludus_thehive_cassandra_thehive_user }}
      WITH PASSWORD = '{{ ludus_thehive_cassandra_thehive_password }}'
      AND LOGIN = true;"
  changed_when: true
  failed_when: false

- name: Create TheHive keyspace
  ansible.builtin.command:
    cmd: >
      cqlsh {{ ludus_thehive_cassandra_listen_address }} 9042
      -u cassandra -p {{ ludus_thehive_cassandra_admin_password }}
      -e "CREATE KEYSPACE IF NOT EXISTS {{ ludus_thehive_cassandra_keyspace }}
      WITH replication = {'class': 'SimpleStrategy', 'replication_factor': {{ ludus_thehive_cassandra_replication_factor }}};"
  changed_when: true
  failed_when: false

- name: Grant TheHive user permissions on keyspace
  ansible.builtin.command:
    cmd: >
      cqlsh {{ ludus_thehive_cassandra_listen_address }} 9042
      -u cassandra -p {{ ludus_thehive_cassandra_admin_password }}
      -e "GRANT ALL PERMISSIONS ON KEYSPACE {{ ludus_thehive_cassandra_keyspace }} TO {{ ludus_thehive_cassandra_thehive_user }};"
  changed_when: true
  failed_when: false
