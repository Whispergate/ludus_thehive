---
- name: Download TheHive GPG key
  ansible.builtin.get_url:
    url: https://keys.download.strangebee.com/latest/gpg/strangebee.gpg
    dest: /usr/share/keyrings/strangebee-keyring.gpg
    mode: "0644"

- name: Download TheHive deb package
  ansible.builtin.get_url:
    url: "https://thehive.download.strangebee.com/{{ ludus_thehive_version_branch }}/deb/thehive_{{ ludus_thehive_version }}_all.deb"
    dest: "/tmp/thehive_{{ ludus_thehive_version }}_all.deb"
    mode: "0644"

- name: Install TheHive deb package
  ansible.builtin.apt:
    deb: "/tmp/thehive_{{ ludus_thehive_version }}_all.deb"
    state: present

- name: Create TheHive file storage directory
  ansible.builtin.file:
    path: "{{ ludus_thehive_storage_local_path }}"
    state: directory
    owner: thehive
    group: thehive
    mode: "0750"
  when: ludus_thehive_storage_type == "local"

- name: Deploy TheHive configuration
  ansible.builtin.template:
    src: application.conf.j2
    dest: /etc/thehive/application.conf
    owner: thehive
    group: thehive
    mode: "0640"
    backup: true
  notify: restart thehive

- name: Enable and start TheHive
  ansible.builtin.service:
    name: thehive
    state: started
    enabled: true

- name: Flush handlers to restart TheHive if needed
  ansible.builtin.meta: flush_handlers

- name: Wait for TheHive to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ ludus_thehive_port }}/api/v1/status/public"
    method: GET
    status_code: 200
  register: thehive_status
  retries: 30
  delay: 10
  until: thehive_status.status == 200
  failed_when: false
