---
- name: Create thehive group
  ansible.builtin.group:
    name: thehive
    gid: "{{ ludus_thehive_run_gid }}"
    system: true

- name: Create thehive user
  ansible.builtin.user:
    name: thehive
    uid: "{{ ludus_thehive_run_uid }}"
    group: thehive
    system: true
    shell: /usr/sbin/nologin
    home: "{{ ludus_thehive_install_dir }}"
    create_home: false

- name: Ensure install directory exists
  ansible.builtin.file:
    path: "{{ ludus_thehive_install_dir }}"
    state: directory
    mode: "0755"

- name: Clone StrangeBee docker repository
  ansible.builtin.git:
    repo: "{{ ludus_thehive_git_repo }}"
    dest: "{{ ludus_thehive_install_dir }}"
    version: "{{ ludus_thehive_git_version }}"
    force: false
    update: false

- name: Generate Elasticsearch password if not provided
  ansible.builtin.set_fact:
    ludus_thehive_elasticsearch_password: >-
      {{ lookup('ansible.builtin.password', '/dev/null', length=48, chars=['ascii_letters', 'digits']) }}
  when: ludus_thehive_elasticsearch_password | length == 0

- name: Generate TheHive play secret if not provided
  ansible.builtin.set_fact:
    ludus_thehive_play_secret: >-
      {{ lookup('ansible.builtin.password', '/dev/null', length=64, chars=['ascii_letters', 'digits']) }}
  when: ludus_thehive_play_secret | length == 0

- name: Read versions.env from cloned repo
  ansible.builtin.slurp:
    src: "{{ ludus_thehive_install_dir }}/versions.env"
  register: versions_env_content

- name: Deploy .env file
  ansible.builtin.template:
    src: dot.env.j2
    dest: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}/.env"
    mode: "0640"
  vars:
    versions_env_body: "{{ versions_env_content.content | b64decode }}"

- name: Deploy index.conf with Elasticsearch credentials
  ansible.builtin.template:
    src: index.conf.j2
    dest: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}/thehive/config/index.conf"
    mode: "0644"

- name: Deploy secret.conf with play secret
  ansible.builtin.template:
    src: secret.conf.j2
    dest: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}/thehive/config/secret.conf"
    mode: "0640"

- name: Ensure data directories exist
  ansible.builtin.file:
    path: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - cassandra/data
    - cassandra/logs
    - elasticsearch/data
    - elasticsearch/logs
    - thehive/data/files
    - thehive/logs
    - certificates
    - nginx/certs

- name: Chown all stack directories to thehive user
  ansible.builtin.file:
    path: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}/{{ item }}"
    state: directory
    owner: "{{ ludus_thehive_run_uid }}"
    group: "{{ ludus_thehive_run_gid }}"
    recurse: true
  loop:
    - cassandra
    - elasticsearch
    - thehive
    - certificates
    - nginx

- name: Check if TLS certificate already exists
  ansible.builtin.stat:
    path: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}/certificates/server.crt"
  register: tls_cert

- name: Generate self-signed TLS certificate for nginx
  ansible.builtin.command:
    cmd: >-
      openssl req -x509 -nodes -newkey rsa:2048
      -keyout certificates/server.key
      -out certificates/server.crt
      -days 3650
      -subj "/CN={{ ludus_thehive_server_name }}"
    chdir: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}"
    creates: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}/certificates/server.crt"
  when:
    - ludus_thehive_enable_nginx
    - not tls_cert.stat.exists

- name: Create empty ca.pem if missing (required by nginx template)
  ansible.builtin.file:
    path: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}/certificates/ca.pem"
    state: touch
    mode: "0644"
  when: ludus_thehive_enable_nginx
  changed_when: false

- name: Deploy docker-compose resource override
  ansible.builtin.template:
    src: docker-compose.override.yml.j2
    dest: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}/docker-compose.override.yml"
    mode: "0644"
  when: ludus_thehive_small_resources

- name: Remove compose override when small_resources is disabled
  ansible.builtin.file:
    path: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}/docker-compose.override.yml"
    state: absent
  when: not ludus_thehive_small_resources

- name: Start TheHive stack with docker compose
  ansible.builtin.command:
    cmd: docker compose up -d --wait --wait-timeout 600
    chdir: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}"
  register: compose_up
  changed_when: "'Started' in compose_up.stdout or 'Created' in compose_up.stdout or 'Recreated' in compose_up.stdout"
  ignore_errors: true

- name: Gather diagnostics if compose up failed
  when: compose_up is failed
  block:
    - name: Get compose ps
      ansible.builtin.command:
        cmd: docker compose ps
        chdir: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}"
      register: compose_ps
      changed_when: false
      failed_when: false

    - name: Get elasticsearch logs
      ansible.builtin.command:
        cmd: docker compose logs --tail=100 elasticsearch
        chdir: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}"
      register: es_logs
      changed_when: false
      failed_when: false

    - name: Get cassandra logs
      ansible.builtin.command:
        cmd: docker compose logs --tail=100 cassandra
        chdir: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}"
      register: cassandra_logs
      changed_when: false
      failed_when: false

    - name: Get thehive logs
      ansible.builtin.command:
        cmd: docker compose logs --tail=100 thehive
        chdir: "{{ ludus_thehive_install_dir }}/{{ ludus_thehive_profile }}"
      register: thehive_logs
      changed_when: false
      failed_when: false

    - name: Get memory status
      ansible.builtin.command: free -m
      register: mem_status
      changed_when: false
      failed_when: false

    - name: Display failure diagnostics
      ansible.builtin.debug:
        msg:
          - "=== free -m ==="
          - "{{ mem_status.stdout_lines | default([]) }}"
          - "=== docker compose ps ==="
          - "{{ compose_ps.stdout_lines | default([]) }}"
          - "=== elasticsearch logs (last 100) ==="
          - "{{ es_logs.stdout_lines | default([]) }}"
          - "=== cassandra logs (last 100) ==="
          - "{{ cassandra_logs.stdout_lines | default([]) }}"
          - "=== thehive logs (last 100) ==="
          - "{{ thehive_logs.stdout_lines | default([]) }}"

    - name: Fail with compose error
      ansible.builtin.fail:
        msg: "TheHive stack failed to become healthy. See diagnostics above."

- name: Wait for TheHive API to become available
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ ludus_thehive_port }}/api/v1/status/public"
    method: GET
    status_code: 200
  register: thehive_status
  retries: 30
  delay: 10
  until: thehive_status.status == 200
  failed_when: false
