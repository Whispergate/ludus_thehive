---
- name: Add Elasticsearch GPG key
  ansible.builtin.get_url:
    url: https://artifacts.elastic.co/GPG-KEY-elasticsearch
    dest: /usr/share/keyrings/elasticsearch-keyring.asc
    mode: "0644"

- name: Add Elasticsearch repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/elasticsearch-keyring.asc] https://artifacts.elastic.co/packages/{{ ludus_thehive_elasticsearch_version }}/apt stable main"
    filename: elastic
    state: present

- name: Install Elasticsearch
  ansible.builtin.apt:
    name: elasticsearch
    state: present
    update_cache: true

- name: Deploy Elasticsearch configuration
  ansible.builtin.template:
    src: elasticsearch.yml.j2
    dest: /etc/elasticsearch/elasticsearch.yml
    owner: root
    group: elasticsearch
    mode: "0660"
    backup: true
  notify: restart elasticsearch

- name: Configure Elasticsearch JVM heap size
  ansible.builtin.template:
    src: elasticsearch-jvm.options.j2
    dest: /etc/elasticsearch/jvm.options.d/thehive.options
    owner: root
    group: elasticsearch
    mode: "0660"
  notify: restart elasticsearch

- name: Enable and start Elasticsearch
  ansible.builtin.service:
    name: elasticsearch
    state: started
    enabled: true

- name: Flush handlers to restart Elasticsearch if needed
  ansible.builtin.meta: flush_handlers

- name: Wait for Elasticsearch to be ready
  ansible.builtin.wait_for:
    port: "{{ ludus_thehive_elasticsearch_port }}"
    host: "{{ ludus_thehive_elasticsearch_host }}"
    delay: 10
    timeout: 120
